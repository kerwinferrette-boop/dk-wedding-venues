<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K & D — Venue Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: rgba(201,168,76,0.15);
    --pink: #D4798A;
    --pink-light: #E899A8;
    --pink-dim: rgba(212,121,138,0.15);
    --dark: #0E0E0E;
    --dark2: #161616;
    --dark3: #1E1E1E;
    --dark4: #262626;
    --border: rgba(255,255,255,0.07);
    --text: #F0EDE8;
    --text-dim: rgba(240,237,232,0.5);
    --text-dimmer: rgba(240,237,232,0.25);
    --card-bg: #161616;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  .header {
    background: linear-gradient(180deg, #0A0A0A 0%, var(--dark) 100%);
    padding: 20px 20px 0;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; letter-spacing: 0.05em; line-height: 1; }
  .logo .amp { color: var(--gold); font-weight: 600; margin: 0 4px; }

  .user-toggle { display: flex; gap: 6px; background: var(--dark3); border-radius: 24px; padding: 4px; }
  .user-btn { padding: 6px 13px; font-size: 12px; font-weight: 600; border-radius: 20px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; letter-spacing: 0.02em; }
  .user-btn.kerwin.active { background: var(--gold); color: #0E0E0E; }
  .user-btn.dani.active { background: var(--pink); color: #fff; }
  .user-btn.family.active { background: var(--dark4); color: var(--text); border: 1px solid var(--border); }

  .search-row { margin-bottom: 12px; position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dimmer); font-size: 15px; pointer-events: none; }
  .search-input { width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px 10px 36px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
  .search-input::placeholder { color: var(--text-dimmer); }
  .search-input:focus { border-color: rgba(201,168,76,0.4); }

  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; padding: 7px 13px; font-size: 11px; font-weight: 600; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
  .chip.active { background: var(--gold); border-color: var(--gold); color: #0E0E0E; }

  .controls { background: var(--dark2); border-bottom: 1px solid var(--border); padding: 14px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .control-block label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dimmer); margin-bottom: 6px; }
  .control-row { display: flex; align-items: center; gap: 8px; }
  .slider { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; background: var(--dark4); outline: none; cursor: pointer; }
  .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--gold); cursor: pointer; box-shadow: 0 0 0 3px rgba(201,168,76,0.2); }
  .slider-val { font-size: 15px; font-weight: 700; color: var(--gold); min-width: 36px; text-align: right; }
  .budget-input-wrap { position: relative; }
  .budget-prefix { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text-dim); font-weight: 600; pointer-events: none; }
  .budget-input { width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; padding: 9px 10px 9px 22px; font-size: 13px; font-weight: 600; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
  .budget-input:focus { border-color: rgba(201,168,76,0.4); }

  .meta-bar { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-dimmer); letter-spacing: 0.05em; text-transform: uppercase; }
  .meta-count { font-weight: 600; color: var(--text-dim); }

  .venue-list { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 10px; }

  .venue-card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: border-color 0.2s; }
  .venue-card.rated-kerwin { border-color: rgba(201,168,76,0.4); }
  .venue-card.rated-dani { border-color: rgba(212,121,138,0.4); }
  .venue-card.rated-both { border: 1.5px solid transparent; background: linear-gradient(var(--card-bg), var(--card-bg)) padding-box, linear-gradient(135deg, var(--gold), var(--pink)) border-box; }
  .venue-card.over-cap { opacity: 0.35; }

  .card-body { padding: 14px 14px 10px; }
  .venue-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; line-height: 1.2; color: var(--text); margin-bottom: 7px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .pill { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 7px; border-radius: 6px; }
  .p-bay { background: rgba(74,144,226,0.15); color: #7BB3F0; border: 1px solid rgba(74,144,226,0.2); }
  .p-socal { background: rgba(226,100,74,0.15); color: #F09070; border: 1px solid rgba(226,100,74,0.2); }
  .p-monterey { background: rgba(74,180,100,0.15); color: #80D496; border: 1px solid rgba(74,180,100,0.2); }
  .p-other { background: rgba(180,180,180,0.1); color: #aaa; border: 1px solid rgba(180,180,180,0.15); }
  .p-aqua { background: rgba(74,200,180,0.15); color: #6DCFBE; border: 1px solid rgba(74,200,180,0.2); }
  .p-arch { background: rgba(150,100,226,0.15); color: #C090F0; border: 1px solid rgba(150,100,226,0.2); }
  .p-planet { background: rgba(60,80,200,0.15); color: #9AAAF0; border: 1px solid rgba(60,80,200,0.2); }
  .p-top { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
  .p-overcap { background: rgba(200,60,60,0.15); color: #F07070; border: 1px solid rgba(200,60,60,0.2); }

  .highlight-text { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 8px; }
  .note-text { font-size: 11px; color: var(--gold); font-weight: 500; margin-bottom: 10px; }

  .rating-section { display: flex; gap: 8px; }
  .rater { flex: 1; background: var(--dark3); border-radius: 10px; padding: 8px 10px; }
  .rater-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
  .rater-label.k { color: var(--gold); }
  .rater-label.d { color: var(--pink); }
  .stars-row { display: flex; gap: 2px; }
  .star-btn { font-size: 13px; cursor: pointer; color: var(--dark4); background: none; border: none; padding: 1px; line-height: 1; transition: transform 0.1s, color 0.1s; font-family: inherit; }
  .star-btn:active { transform: scale(0.8); }
  .star-btn.filled-k { color: var(--gold); }
  .star-btn.filled-d { color: var(--pink); }
  .star-btn.disabled { pointer-events: none; opacity: 0.6; }
  .score-display { font-size: 11px; font-weight: 600; margin-top: 3px; min-height: 14px; }
  .score-display.k { color: var(--gold); }
  .score-display.d { color: var(--pink); }

  .cost-toggle { width: 100%; background: none; border: none; border-top: 1px solid var(--border); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; }
  .cost-total-preview { font-weight: 700; font-size: 13px; color: var(--text); }
  .budget-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .dot-green { background: #4CAF50; box-shadow: 0 0 4px rgba(76,175,80,0.5); }
  .dot-yellow { background: #FFC107; box-shadow: 0 0 4px rgba(255,193,7,0.5); }
  .dot-red { background: #F44336; box-shadow: 0 0 4px rgba(244,67,54,0.5); }
  .cost-chevron { transition: transform 0.2s; font-size: 10px; }
  .cost-chevron.open { transform: rotate(180deg); }

  .cost-breakdown { display: none; padding: 10px 14px 12px; border-top: 1px solid var(--border); }
  .cost-breakdown.open { display: block; animation: slideDown 0.2s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .cost-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; color: var(--text-dim); border-bottom: 1px solid rgba(255,255,255,0.04); }
  .cost-row:last-child { border-bottom: none; }
  .cost-row.total { color: var(--text); font-weight: 700; font-size: 13px; padding-top: 8px; margin-top: 2px; border-top: 1px solid var(--border); border-bottom: none; }
  .venue-link { font-size: 10px; color: var(--text-dimmer); text-decoration: none; display: flex; align-items: center; gap: 3px; padding: 2px 14px 10px; transition: color 0.15s; letter-spacing: 0.03em; }
  .venue-link:hover { color: var(--gold); }

  .loading { text-align: center; padding: 60px 20px; color: var(--text-dimmer); font-size: 14px; }
  .loading-ring { width: 28px; height: 28px; border: 2px solid var(--dark4); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dimmer); }
  .empty-state .big { font-size: 32px; margin-bottom: 10px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--text); z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ADD VENUE FORM */
  .add-section { margin: 0 16px 32px; background: var(--dark2); border: 1px dashed rgba(201,168,76,0.2); border-radius: var(--radius); overflow: hidden; }
  .add-toggle { width: 100%; background: none; border: none; padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; }
  .add-toggle .plus { font-size: 20px; color: var(--gold); line-height: 1; }
  .add-toggle .chevron { margin-left: auto; font-size: 10px; transition: transform 0.2s; }
  .add-toggle .chevron.open { transform: rotate(180deg); }
  .add-form { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .add-form.open { display: block; animation: slideDown 0.2s ease; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-field label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dimmer); margin-bottom: 4px; }
  .form-field input, .form-field select, .form-field textarea { width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: rgba(201,168,76,0.4); }
  .form-field select option { background: var(--dark3); }
  .form-field textarea { resize: vertical; min-height: 70px; }
  .toggle-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .toggle-chip { padding: 6px 12px; font-size: 11px; font-weight: 600; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .toggle-chip.on { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
  .submit-btn { width: 100%; margin-top: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #0E0E0E; border: none; border-radius: 12px; padding: 13px; font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; transition: opacity 0.2s; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">K <span class="amp">&</span> D</div>
    <div class="user-toggle">
      <button class="user-btn kerwin" onclick="setUser('kerwin')">Kerwin</button>
      <button class="user-btn dani" onclick="setUser('dani')">Dani</button>
      <button class="user-btn family" onclick="setUser('family')">Family</button>
    </div>
  </div>
  <div class="search-row">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" placeholder="Search venues…" id="searchInput" oninput="applyFilters()">
  </div>
  <div class="filter-row">
    <button class="chip active" onclick="setFilter('all',this)">All</button>
    <button class="chip" onclick="setFilter('bay',this)">Bay Area</button>
    <button class="chip" onclick="setFilter('socal',this)">SoCal</button>
    <button class="chip" onclick="setFilter('monterey',this)">Monterey</button>
    <button class="chip" onclick="setFilter('top',this)">⭐ Top Picks</button>
    <button class="chip" onclick="setFilter('fits',this)">Fits Count</button>
    <button class="chip" onclick="setFilter('aqua',this)">🦈 Aquarium</button>
    <button class="chip" onclick="setFilter('arch',this)">🏛 Architect</button>
    <button class="chip" onclick="setFilter('planet',this)">🔭 Planetarium</button>
    <button class="chip" onclick="setFilter('rated',this)">Rated by Us</button>
  </div>
</div>

<div class="controls">
  <div class="control-block">
    <label>Guest Count</label>
    <div class="control-row">
      <input type="range" class="slider" id="guestSlider" min="50" max="400" value="250" oninput="updateGuests(this.value)">
      <span class="slider-val" id="guestVal">250</span>
    </div>
  </div>
  <div class="control-block">
    <label>Budget</label>
    <div class="budget-input-wrap">
      <span class="budget-prefix">$</span>
      <input type="number" class="budget-input" id="budgetInput" value="80000" oninput="applyFilters()">
    </div>
  </div>
</div>

<div class="meta-bar">
  <span id="countLabel" class="meta-count">Loading…</span>
  <span id="budgetLabel"></span>
</div>

<div class="venue-list" id="venueList">
  <div class="loading"><div class="loading-ring"></div>Loading venues…</div>
</div>

<div class="add-section" id="addSection">
  <button class="add-toggle" onclick="toggleAddForm()">
    <span class="plus">+</span>
    <span>Suggest a Venue</span>
    <span class="chevron" id="addChevron">▼</span>
  </button>
  <div class="add-form" id="addForm">
    <div class="form-grid">
      <div class="form-field full">
        <label>Venue Name *</label>
        <input type="text" id="f_name" placeholder="e.g. The Broad, Los Angeles">
      </div>
      <div class="form-field">
        <label>Region *</label>
        <select id="f_region">
          <option value="bay">Bay Area</option>
          <option value="socal">SoCal</option>
          <option value="monterey">Monterey</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-field">
        <label>Max Capacity</label>
        <input type="number" id="f_cap" placeholder="300">
      </div>
      <div class="form-field">
        <label>Venue Fee ($)</label>
        <input type="number" id="f_fee" placeholder="5000">
      </div>
      <div class="form-field">
        <label>Catering / Person ($)</label>
        <input type="number" id="f_catering" placeholder="90">
      </div>
      <div class="form-field full">
        <label>What makes it special</label>
        <input type="text" id="f_highlight" placeholder="e.g. Rooftop with Golden Gate views…">
      </div>
      <div class="form-field full">
        <label>Website URL</label>
        <input type="url" id="f_url" placeholder="https://…">
      </div>
      <div class="form-field full">
        <label>Notes / Why you're suggesting it</label>
        <textarea id="f_note" placeholder="I think you two would love this because…"></textarea>
      </div>
    </div>
    <div style="margin-top:12px">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:8px;">Tags</div>
      <div class="toggle-row">
        <button class="toggle-chip" data-tag="aqua" onclick="toggleTag(this)">🦈 Aquarium</button>
        <button class="toggle-chip" data-tag="arch" onclick="toggleTag(this)">🏛 Architecture</button>
        <button class="toggle-chip" data-tag="planet" onclick="toggleTag(this)">🔭 Planetarium</button>
        <button class="toggle-chip" data-tag="leader" onclick="toggleTag(this)">⭐ Top Pick</button>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitVenue()">Submit Venue</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://xrgzaovididcizstswsy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_feE5EFiIqR14CGYTElCCAg_nfP3Nv8V';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = localStorage.getItem('weddingUser') || 'kerwin';
let guestCount = 250;
let activeFilter = 'all';
let allVenues = [];
let allRatings = {};
let tagFlags = {};

function setUser(u) {
  currentUser = u;
  localStorage.setItem('weddingUser', u);
  document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
  const match = Array.from(document.querySelectorAll('.user-btn')).find(b => b.classList.contains(u));
  if (match) match.classList.add('active');
  renderVenues();
  showToast(`Viewing as ${u.charAt(0).toUpperCase() + u.slice(1)}`);
}

function updateGuests(val) {
  guestCount = parseInt(val);
  document.getElementById('guestVal').textContent = val;
  renderVenues();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderVenues();
}

function applyFilters() { renderVenues(); }

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return allVenues.filter(v => {
    if (q && !v.name.toLowerCase().includes(q) && !(v.highlight||'').toLowerCase().includes(q) && !(v.region_label||'').toLowerCase().includes(q)) return false;
    if (activeFilter === 'bay') return v.region === 'bay';
    if (activeFilter === 'socal') return v.region === 'socal';
    if (activeFilter === 'monterey') return v.region === 'monterey';
    if (activeFilter === 'top') return v.leader;
    if (activeFilter === 'fits') return !v.max_cap || v.max_cap >= guestCount;
    if (activeFilter === 'aqua') return v.aqua;
    if (activeFilter === 'arch') return v.arch;
    if (activeFilter === 'planet') return v.planet;
    if (activeFilter === 'rated') { const r = allRatings[v.id]||{}; return (r.kerwin||0)>0 || (r.dani||0)>0; }
    return true;
  });
}

function cost(v) {
  const fee = v.venue_fee||0, cat = (v.catering_pp||0)*guestCount, bar = (v.bar_pp||0)*guestCount;
  return { fee, cat, bar, total: fee+cat+bar };
}

function dotClass(total) {
  const b = parseInt(document.getElementById('budgetInput').value)||80000;
  if (total <= b*0.75) return 'dot-green';
  if (total <= b) return 'dot-yellow';
  return 'dot-red';
}

function buildStars(venueId, user, score) {
  const isMe = currentUser === user;
  const fc = user === 'kerwin' ? 'filled-k' : 'filled-d';
  return Array.from({length:7},(_,i) => {
    const n = i+1;
    const f = n <= score ? fc : '';
    const d = isMe ? '' : ' disabled';
    const click = isMe ? `onclick="rate(${venueId},${n})"` : '';
    return `<button class="star-btn ${f}${d}" ${click} title="${n}/7">★</button>`;
  }).join('');
}

function renderVenues() {
  const filtered = getFiltered();
  const budget = parseInt(document.getElementById('budgetInput').value)||80000;
  const list = document.getElementById('venueList');
  document.getElementById('countLabel').textContent = `${filtered.length} venue${filtered.length!==1?'s':''}`;
  document.getElementById('budgetLabel').textContent = `Budget: $${budget.toLocaleString()}`;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">🔍</div><p>No venues match.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(v => {
    const c = cost(v);
    const dc = dotClass(c.total);
    const overCap = v.max_cap && v.max_cap < guestCount;
    const r = allRatings[v.id]||{};
    const ks = r.kerwin||0, ds = r.dani||0;
    const rc = ks>0&&ds>0 ? 'rated-both' : ks>0 ? 'rated-kerwin' : ds>0 ? 'rated-dani' : '';
    const regionClass = `p-${v.region||'bay'}`;
    const regionLabel = {bay:'Bay Area',socal:'SoCal',monterey:'Monterey',other:'Other'}[v.region]||v.region||'';

    return `<div class="venue-card ${rc}${overCap?' over-cap':''}" id="card-${v.id}">
      <div class="card-body">
        <div class="venue-name">${v.name}</div>
        <div class="pill-row">
          <span class="pill ${regionClass}">${regionLabel}</span>
          ${v.aqua?'<span class="pill p-aqua">🦈 Aquarium</span>':''}
          ${v.arch?'<span class="pill p-arch">🏛 Architect</span>':''}
          ${v.planet?'<span class="pill p-planet">🔭 Planetarium</span>':''}
          ${v.leader?'<span class="pill p-top">⭐ Top Pick</span>':''}
          ${overCap?'<span class="pill p-overcap">Over Cap</span>':''}
        </div>
        ${v.highlight?`<div class="highlight-text">${v.highlight}</div>`:''}
        ${v.note?`<div class="note-text">✦ ${v.note}</div>`:''}
        <div class="rating-section">
          <div class="rater">
            <div class="rater-label k">Kerwin</div>
            <div class="stars-row" id="ks-${v.id}">${buildStars(v.id,'kerwin',ks)}</div>
            <div class="score-display k" id="ksc-${v.id}">${ks>0?ks+'/7':''}</div>
          </div>
          <div class="rater">
            <div class="rater-label d">Dani</div>
            <div class="stars-row" id="ds-${v.id}">${buildStars(v.id,'dani',ds)}</div>
            <div class="score-display d" id="dsc-${v.id}">${ds>0?ds+'/7':''}</div>
          </div>
        </div>
      </div>
      <button class="cost-toggle" onclick="toggleCost(${v.id})">
        <span><span class="budget-dot ${dc}"></span>Est. Total</span>
        <span><span class="cost-total-preview">$${c.total.toLocaleString()}</span>&nbsp;<span class="cost-chevron" id="chev-${v.id}">▼</span></span>
      </button>
      <div class="cost-breakdown" id="bd-${v.id}">
        <div class="cost-row"><span>Venue Fee</span><span>$${c.fee.toLocaleString()}</span></div>
        <div class="cost-row"><span>Catering (${guestCount} × $${v.catering_pp||0}/pp)</span><span>$${c.cat.toLocaleString()}</span></div>
        <div class="cost-row"><span>Bar (${guestCount} × $${v.bar_pp||0}/pp)</span><span>$${c.bar.toLocaleString()}</span></div>
        <div class="cost-row total"><span>Estimated Total</span><span>$${c.total.toLocaleString()}</span></div>
        ${v.disclaimer?`<div style="font-size:10px;color:var(--text-dimmer);margin-top:6px;line-height:1.5;">${v.disclaimer}</div>`:''}
      </div>
      ${v.url?`<a class="venue-link" href="${v.url}" target="_blank">↗ Visit Website</a>`:''}
    </div>`;
  }).join('');
}

function toggleCost(id) {
  document.getElementById(`bd-${id}`).classList.toggle('open');
  document.getElementById(`chev-${id}`).classList.toggle('open');
}

async function rate(venueId, score) {
  if (!currentUser || currentUser === 'family') { showToast('Select Kerwin or Dani to rate'); return; }
  if (!allRatings[venueId]) allRatings[venueId] = {};
  const prev = allRatings[venueId][currentUser]||0;
  const newScore = prev === score ? 0 : score;
  allRatings[venueId][currentUser] = newScore;

  const isK = currentUser === 'kerwin';
  document.getElementById(isK?`ks-${venueId}`:`ds-${venueId}`).innerHTML = buildStars(venueId, currentUser, newScore);
  document.getElementById(isK?`ksc-${venueId}`:`dsc-${venueId}`).textContent = newScore>0?newScore+'/7':'';

  const card = document.getElementById(`card-${venueId}`);
  const ks = allRatings[venueId].kerwin||0, ds = allRatings[venueId].dani||0;
  card.classList.remove('rated-kerwin','rated-dani','rated-both');
  if (ks>0&&ds>0) card.classList.add('rated-both');
  else if (ks>0) card.classList.add('rated-kerwin');
  else if (ds>0) card.classList.add('rated-dani');

  showToast(newScore>0 ? `Rated ${newScore}/7 ★` : 'Rating cleared');

  try {
    if (newScore === 0) {
      await sb.from('ratings').delete().eq('module','venues').eq('item_id',venueId).eq('rated_by',currentUser);
    } else {
      await sb.from('ratings').upsert({ module:'venues', item_id:venueId, rated_by:currentUser, score:newScore }, { onConflict:'module,item_id,rated_by' });
    }
  } catch(e) { console.warn('Rating not persisted (table may need setup):', e.message); }
}

function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('open');
  document.getElementById('addChevron').classList.toggle('open');
}

function toggleTag(el) {
  el.classList.toggle('on');
  tagFlags[el.dataset.tag] = el.classList.contains('on');
}

async function submitVenue() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { showToast('Please enter a venue name'); return; }
  const region = document.getElementById('f_region').value;
  const regionLabel = {bay:'Bay Area',socal:'SoCal',monterey:'Monterey',other:'Other'}[region];
  const venue = {
    name, region, region_label: regionLabel,
    max_cap: parseInt(document.getElementById('f_cap').value)||null,
    venue_fee: parseInt(document.getElementById('f_fee').value)||null,
    catering_pp: parseInt(document.getElementById('f_catering').value)||null,
    bar_pp: 35,
    highlight: document.getElementById('f_highlight').value.trim()||null,
    url: document.getElementById('f_url').value.trim()||null,
    note: document.getElementById('f_note').value.trim()||null,
    aqua: !!tagFlags.aqua, arch: !!tagFlags.arch, planet: !!tagFlags.planet, leader: !!tagFlags.leader
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';

  try {
    const { data, error } = await sb.from('venues').insert([venue]).select();
    if (error) throw error;
    if (data?.[0]) allVenues.push(data[0]);
    renderVenues();
    showToast(`✓ ${name} added!`);
    ['f_name','f_cap','f_fee','f_catering','f_highlight','f_url','f_note'].forEach(id => document.getElementById(id).value='');
    document.querySelectorAll('.toggle-chip').forEach(c => c.classList.remove('on'));
    tagFlags = {};
    toggleAddForm();
  } catch(e) {
    showToast('Saved locally (Supabase setup needed for live sync)');
    venue.id = Date.now();
    allVenues.push(venue);
    renderVenues();
    ['f_name','f_cap','f_fee','f_catering','f_highlight','f_url','f_note'].forEach(id => document.getElementById(id).value='');
    document.querySelectorAll('.toggle-chip').forEach(c => c.classList.remove('on'));
    tagFlags = {};
    toggleAddForm();
  }

  btn.disabled = false; btn.textContent = 'Submit Venue';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

async function loadData() {
  try {
    const { data: venues } = await sb.from('venues').select('*').order('id');
    if (venues?.length) { allVenues = venues; }
    else { allVenues = seedVenues(); }
  } catch(e) { allVenues = seedVenues(); }

  try {
    const { data: ratings } = await sb.from('ratings').select('*').eq('module','venues');
    if (ratings) ratings.forEach(r => {
      if (!allRatings[r.item_id]) allRatings[r.item_id] = {};
      allRatings[r.item_id][r.rated_by] = r.score;
    });
  } catch(e) {}

  renderVenues();

  // Realtime
  try {
    sb.channel('rating-sync').on('postgres_changes',{event:'*',schema:'public',table:'ratings'}, p => {
      const r = p.new||p.old; if (!r||r.module!=='venues') return;
      if (!allRatings[r.item_id]) allRatings[r.item_id] = {};
      allRatings[r.item_id][r.rated_by] = p.eventType==='DELETE' ? 0 : r.score;
      const isK = r.rated_by==='kerwin';
      const sc = allRatings[r.item_id][r.rated_by]||0;
      const se = document.getElementById(isK?`ks-${r.item_id}`:`ds-${r.item_id}`);
      const sce = document.getElementById(isK?`ksc-${r.item_id}`:`dsc-${r.item_id}`);
      if (se) se.innerHTML = buildStars(r.item_id, r.rated_by, sc);
      if (sce) sce.textContent = sc>0?sc+'/7':'';
      const card = document.getElementById(`card-${r.item_id}`);
      if (card) {
        const ks=allRatings[r.item_id].kerwin||0, ds=allRatings[r.item_id].dani||0;
        card.classList.remove('rated-kerwin','rated-dani','rated-both');
        if (ks>0&&ds>0) card.classList.add('rated-both'); else if (ks>0) card.classList.add('rated-kerwin'); else if (ds>0) card.classList.add('rated-dani');
      }
    }).subscribe();

    sb.channel('venue-sync').on('postgres_changes',{event:'INSERT',schema:'public',table:'venues'}, p => {
      if (p.new && !allVenues.find(v=>v.id===p.new.id)) {
        allVenues.push(p.new); renderVenues();
        showToast(`New venue added: ${p.new.name}`);
      }
    }).subscribe();
  } catch(e) {}
}
