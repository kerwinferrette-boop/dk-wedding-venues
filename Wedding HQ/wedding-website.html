<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kerwin &amp; Danielle &mdash; March 27, 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Great+Vibes&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0A0A0A;
      --ivory: #F5F0E6;
      --gold:  #C9A96E;
      --gold-dk: #B8936A;
      --espresso: #3D2410;
      --warm-white: #FAF8F2;
      --blush: #D4AFA8;
      --sea-glass: #8FB5B0;
      --crimson: #8B1A1A;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      font-family: 'Jost', sans-serif;
      color: var(--ivory);
      -webkit-font-smoothing: antialiased;
      line-height: 1;
    }

    /* ─── GLOBAL ─── */
    .foil {
      background: linear-gradient(135deg, #C9A96E 0%, #E8D080 35%, #C9A96E 55%, #9A7740 80%, #C9A96E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .dv { display:flex;align-items:center; }
    .dl { flex:1;height:1px;background:currentColor; }
    .dd { width:6px;height:6px;background:currentColor;transform:rotate(45deg);flex-shrink:0;margin:0 10px; }

    /* ─────────────────────────────────────────── */
    /*  NAV                                       */
    /* ─────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,169,110,0.12);
      padding: 0 60px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-monogram {
      font-family: 'Cinzel Decorative', serif;
      font-size: 16px;
      letter-spacing: 4px;
    }
    .nav-monogram span { color: var(--gold); }
    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }
    .nav-links a {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(245,240,230,0.45);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-date {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--gold-dk);
    }

    /* ─────────────────────────────────────────── */
    /*  SECTION: HERO                             */
    /* ─────────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 60px 80px;
      position: relative;
      overflow: hidden;
    }
    #hero::before {
      content:'';
      position:absolute;
      inset:0;
      background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(201,169,110,0.06) 0%, transparent 100%);
    }
    /* Subtle grid pattern overlay */
    #hero::after {
      content:'';
      position:absolute;
      inset:0;
      opacity:0.02;
      background-image:
        linear-gradient(rgba(201,169,110,0.8) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,169,110,0.8) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hero-eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 8px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(201,169,110,0.5);
      margin-bottom: 48px;
    }
    .hero-monogram {
      width: 200px;
      height: 246px;
      margin-bottom: 44px;
    }
    .hero-names {
      font-family: 'Great Vibes', cursive;
      font-size: 96px;
      line-height: 1;
      margin-bottom: 14px;
    }
    .hero-and {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--gold-dk);
      margin-bottom: 12px;
    }
    .hero-date {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 8px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .hero-venue {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: rgba(245,240,230,0.3);
    }
    .hero-countdown {
      display: flex;
      gap: 48px;
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid rgba(201,169,110,0.12);
    }
    .countdown-unit {
      text-align: center;
    }
    .countdown-number {
      font-family: 'Cinzel Decorative', serif;
      font-size: 40px;
      color: var(--gold);
      display: block;
      margin-bottom: 8px;
    }
    .countdown-label {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(245,240,230,0.25);
    }
    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
    }
    .hero-scroll span {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 7px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(201,169,110,0.3);
    }

    /* ─────────────────────────────────────────── */
    /*  SECTION BASE STYLES                       */
    /* ─────────────────────────────────────────── */
    .section {
      padding: 120px 100px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .section-full { padding: 120px 0; }

    .section-eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 8px;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: var(--gold-dk);
      margin-bottom: 20px;
    }
    .section-title {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 28px;
      letter-spacing: 4px;
      color: var(--ivory);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .section-divider {
      display: flex;
      align-items: center;
      width: 80px;
      margin-bottom: 40px;
    }
    .section-divider-line { flex:1;height:1px;background:var(--gold);opacity:0.4; }
    .section-divider-dot { width:4px;height:4px;background:var(--gold);border-radius:50%;margin-left:10px; }

    /* ─────────────────────────────────────────── */
    /*  OUR STORY                                 */
    /* ─────────────────────────────────────────── */
    #story {
      background: #0D0B08;
      border-top: 1px solid rgba(201,169,110,0.06);
      border-bottom: 1px solid rgba(201,169,110,0.06);
    }
    .story-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .story-text {}
    .story-text p {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 18px;
      line-height: 1.9;
      color: rgba(245,240,230,0.55);
      margin-bottom: 20px;
    }
    .story-image-placeholder {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #1A1510;
      border: 1px solid rgba(201,169,110,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .story-image-placeholder::before {
      content:'';
      position:absolute;
      inset:0;
      background:radial-gradient(ellipse 60% 40% at 50% 60%, rgba(201,169,110,0.04) 0%, transparent 100%);
    }
    .story-milestones {
      display: flex;
      flex-direction: column;
      gap: 32px;
      margin-top: 40px;
    }
    .milestone {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
      padding-bottom: 32px;
      border-bottom: 1px solid rgba(245,240,230,0.05);
    }
    .milestone:last-child { border-bottom: none; padding-bottom: 0; }
    .milestone-year {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--gold-dk);
      white-space: nowrap;
      padding-top: 3px;
    }
    .milestone-text h4 {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--ivory);
      margin-bottom: 8px;
    }
    .milestone-text p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: rgba(245,240,230,0.4);
      line-height: 1.6;
    }

    /* ─────────────────────────────────────────── */
    /*  SCHEDULE                                  */
    /* ─────────────────────────────────────────── */
    #schedule {
      background: var(--black);
    }
    .schedule-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      background: rgba(201,169,110,0.06);
    }
    .schedule-item {
      background: #0D0B08;
      padding: 44px 40px;
      display: flex;
      gap: 28px;
    }
    .schedule-time {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--gold-dk);
      white-space: nowrap;
      padding-top: 3px;
      min-width: 72px;
    }
    .schedule-info h3 {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--ivory);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .schedule-info p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: rgba(245,240,230,0.4);
      line-height: 1.6;
    }

    /* ─────────────────────────────────────────── */
    /*  TRAVEL & HOTEL                            */
    /* ─────────────────────────────────────────── */
    #travel {
      background: #0D0B08;
      border-top: 1px solid rgba(201,169,110,0.06);
    }
    .travel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2px;
      background: rgba(201,169,110,0.06);
      margin-top: 60px;
    }
    .travel-card {
      background: #0A0A0A;
      padding: 44px 36px;
    }
    .travel-icon {
      width: 36px;
      height: 36px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    .travel-card h3 {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .travel-card p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      color: rgba(245,240,230,0.45);
      line-height: 1.8;
    }
    .travel-card a {
      display: inline-block;
      margin-top: 16px;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-dk);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,169,110,0.3);
      padding-bottom: 3px;
    }

    /* ─────────────────────────────────────────── */
    /*  RSVP                                      */
    /* ─────────────────────────────────────────── */
    #rsvp {
      background: var(--black);
      border-top: 1px solid rgba(201,169,110,0.06);
    }
    .rsvp-inner {
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
    }
    .rsvp-form {
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: left;
    }
    .form-group { display: flex; flex-direction: column; gap: 10px; }
    .form-label {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(201,169,110,0.5);
    }
    .form-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(201,169,110,0.2);
      padding: 12px 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      color: rgba(245,240,230,0.6);
      outline: none;
      width: 100%;
    }
    .form-input::placeholder { color: rgba(245,240,230,0.2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .form-radio-group {
      display: flex;
      gap: 32px;
      margin-top: 4px;
    }
    .form-radio {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .form-radio-box {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(201,169,110,0.3);
      flex-shrink: 0;
    }
    .form-radio span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: rgba(245,240,230,0.45);
    }
    .form-submit {
      margin-top: 12px;
      background: var(--gold);
      color: var(--black);
      border: none;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 18px 48px;
      cursor: pointer;
      align-self: center;
    }
    .rsvp-deadline {
      margin-top: 24px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: rgba(245,240,230,0.25);
      text-align: center;
    }

    /* ─────────────────────────────────────────── */
    /*  REGISTRY                                  */
    /* ─────────────────────────────────────────── */
    #registry {
      background: #0D0B08;
      border-top: 1px solid rgba(201,169,110,0.06);
    }
    .registry-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2px;
      background: rgba(201,169,110,0.06);
      margin-top: 60px;
    }
    .registry-card {
      background: #0A0A0A;
      padding: 44px 36px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .registry-card h3 {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--ivory);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .registry-card p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: rgba(245,240,230,0.35);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .registry-link {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-dk);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,169,110,0.3);
      padding-bottom: 3px;
    }

    /* ─────────────────────────────────────────── */
    /*  FOOTER                                    */
    /* ─────────────────────────────────────────── */
    footer {
      background: var(--espresso);
      padding: 60px 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer .footer-mono {
      font-family: 'Cinzel Decorative', serif;
      font-size: 22px;
      color: rgba(245,240,230,0.6);
      letter-spacing: 4px;
    }
    footer .footer-mono span { color: var(--gold); }
    footer p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: rgba(245,240,230,0.3);
    }
    footer .footer-right {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(245,240,230,0.25);
      text-align: right;
    }

    /* ─── Wave accent between sections ─── */
    .wave-sep {
      width: 100%;
      overflow: hidden;
      line-height: 0;
      background: #0D0B08;
    }

  <nav>
    <div class="nav-monogram"><span>K</span> &amp; <span>D</span></div>
    <ul class="nav-links">
      <li><a href="#story">Our Story</a></li>

  </nav>

    <div class="section" style="padding:0 100px;">
      <div class="story-grid">
        <div class="story-text">
          <div class="section-eyebrow">Our Story</div>
